name: Verify

on:
  push:
    paths:
      - "**/*.go"
      - go.mod
      - go.sum
      - ".github/workflows/**"
      - "testdata/dockerfiles/**"
  pull_request:
    paths:
      - "**/*.go"
      - go.mod
      - go.sum
      - ".github/workflows/**"
      - "testdata/dockerfiles/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - run: go build -o dockopt ./cmd/dockopt
      - name: Verify fixture exit contracts
        shell: bash
        run: |
          clean_json="$(./dockopt --json testdata/dockerfiles/clean.Dockerfile)"
          printf '%s\n' "$clean_json"
          grep -Fq '"findings":[]' <<<"$clean_json"
          ./dockopt --json testdata/dockerfiles/unsupported-python.Dockerfile

          set +e
          ./dockopt --json testdata/dockerfiles/error-go-static.Dockerfile >/tmp/error.json
          error_status=$?
          ./dockopt --json testdata/dockerfiles/malformed.Dockerfile >/tmp/parse.json
          parse_status=$?
          set -e

          test "$error_status" = "1"
          test "$parse_status" = "2"
