name: Verify

on:
  push:
    paths:
      - "**/*.go"
      - go.mod
      - go.sum
      - ".github/workflows/**"
      - "testdata/dockerfiles/**"
  pull_request:
    paths:
      - "**/*.go"
      - go.mod
      - go.sum
      - ".github/workflows/**"
      - "testdata/dockerfiles/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - run: go build -o dockopt ./cmd/dockopt
      - name: Verify fixture exit contracts
        shell: bash
        run: |
          for fixture in clean clean-go-env complex-multistage; do
            json="$(./dockopt --json "testdata/dockerfiles/$fixture.Dockerfile")"
            printf '%s: %s\n' "$fixture" "$json"
            grep -Fq '"findings":[]' <<<"$json"
          done
          ./dockopt --json testdata/dockerfiles/unsupported-python.Dockerfile

          set +e
          ./dockopt --json testdata/dockerfiles/error-go-static.Dockerfile >/tmp/error.json
          error_status=$?
          ./dockopt --json testdata/dockerfiles/malformed.Dockerfile >/tmp/parse.json
          parse_status=$?
          ./dockopt --fail-on warn testdata/dockerfiles/warn-untagged.Dockerfile >/tmp/untagged.txt
          untagged_status=$?
          ./dockopt --fail-on warn testdata/dockerfiles/warn-apt.Dockerfile >/tmp/apt.txt
          apt_status=$?
          # aggregate exit: one clean + one unparseable must surface as 2
          ./dockopt --json testdata/dockerfiles/clean.Dockerfile testdata/dockerfiles/malformed.Dockerfile >/tmp/multi.jsonl
          multi_status=$?
          set -e

          test "$error_status" = "1"
          test "$parse_status" = "2"
          test "$untagged_status" = "1"
          grep -Fq 'GEN001' /tmp/untagged.txt
          test "$apt_status" = "1"
          for id in GEN002 GEN003 GEN004 GEN005; do grep -Fq "$id" /tmp/apt.txt; done
          test "$multi_status" = "2"
          test "$(grep -c '"schema_version"' /tmp/multi.jsonl)" = "2"
